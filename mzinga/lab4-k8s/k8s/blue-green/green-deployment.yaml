apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-green
  namespace: mzinga-lab4
  labels:
    app: webapp
    slot: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
      slot: green
  template:
    metadata:
      labels:
        app: webapp
        slot: green
        version: v2
    spec:
      containers:
        - name: webapp
          image: mzinga-webapp:2.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "2.0.0"
            - name: APP_COLOR
              value: "green"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
